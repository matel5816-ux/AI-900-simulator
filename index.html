<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-900 模擬考場</title>
  <!-- 載入 React 與 Babel (讓瀏覽器讀懂程式碼) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- 載入樣式庫 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .exam-content-area { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 16px; color: #1e293b; line-height: 1.6; }
    .exam-content-area p, .exam-content-area ul, .exam-content-area div { margin-bottom: 16px; }
    .exam-content-area ul { list-style-type: none; padding-left: 0; }
    .exam-content-area li { margin-bottom: 12px; padding: 12px 16px; border-radius: 4px; background-color: #f8fafc; border: 1px solid #e2e8f0; display: flex; align-items: flex-start; }
    .exam-content-area li label { cursor: pointer; width: 100%; display: block; padding-left: 10px; margin-top:-2px;}
    .exam-content-area input[type="radio"], .exam-content-area input[type="checkbox"] { width: 1.2rem; height: 1.2rem; margin-top: 2px; accent-color: #0078D4; cursor: pointer; flex-shrink: 0; }
    .matching-container { display: flex; gap: 24px; margin-top: 20px; flex-wrap: wrap; }
    .matching-column { flex: 1; min-width: 250px; background: #f1f5f9; padding: 16px; border-radius: 6px; border: 1px solid #cbd5e1; }
    .matching-item { background-color: white; border: 1px solid #94a3b8; padding: 10px; margin-bottom: 8px; border-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); font-weight: 500; }
    .matching-answer-area { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; background: white; padding: 8px 12px; border-radius: 4px; border: 1px solid #cbd5e1; }
    .matching-answer-area input[type="text"] { width: 45px; height: 36px; text-align: center; font-weight: bold; border: 2px solid #0078D4; border-radius: 4px; text-transform: uppercase; font-size: 16px; outline: none; }
    .yes-no-item-container { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
    .result-locked input, .result-locked select { opacity: 0.8; cursor: not-allowed; }
  </style>
</head>
<body class="bg-[#f3f4f6]">
  <div id="root"></div>

  <script type="text/babel">
    // 這裡引入圖標組件 (模擬 Lucide-React)
    const { Play, Clock, Flag, ChevronLeft, ChevronRight, CheckCircle2, XCircle, RefreshCw, LayoutGrid, Info, UploadCloud, Settings2 } = window.lucide || {};
    
    // 如果沒有 Lucide，我們用簡單文字代替圖標
    const Icon = ({ name }) => <span className="mr-2">[{name}]</span>;

    const { useState, useEffect, useRef } = React;

    const AI900_TERMS = ["Azure OpenAI", "表格辨識器 (Form Recognizer)", "電腦視覺 (Computer Vision)", "自訂視覺 (Custom Vision)", "臉部服務 (Face)", "自然語言處理 (NLP)", "語音服務 (Speech)", "自動化機器學習 (Automated ML)", "分類 (Classification)", "迴歸 (Regression)", "叢集 (Clustering)", "公平性 (Fairness)", "可靠性與安全性 (Reliability & Safety)", "隱私權與安全性 (Privacy & Security)", "包容性 (Inclusiveness)", "透明度 (Transparency)", "權責性 (Accountability)", "異常偵測 (Anomaly Detection)", "內容安全性 (Content Safety)", "Azure AI 搜尋 (AI Search)", "語言理解 (LUIS)", "文字分析 (Text Analytics)", "知識採礦 (Knowledge Mining)", "交談式 AI (Conversational AI)"];

    const EXAM_HTML_DATA = `
      <!-- Question 250 -->
      <div class="question-card" id="question-250">
         <div class="question-meta">描述 Azure 上的電腦視覺工作負載的特點 (15-20%)</div>
         <div class="question-title">第二百五十題 (選擇題)</div>
         <div class="question-body">
            <p>您應該使用下列哪種服務，從已掃描的檔中自動識取文字、索引鍵/值組以及資料表資料？</p>
            <ul>
               <li><input type="radio" name="q250" value="A" id="q250a" checked><label for="q250a"> A. 表格辨識器 (Form Recognizer)</label></li>
               <li><input type="radio" name="q250" value="B" id="q250b"><label for="q250b"> B. 文字分析</label></li>
               <li><input type="radio" name="q250" value="C" id="q250c"><label for="q250c"> C. 自訂視覺</label></li>
               <li><input type="radio" name="q250" value="D" id="q250d"><label for="q250d"> D. Language Understanding (LUIS)</label></li>
            </ul>
         </div>
         <div class="answer-content">
            <div class="answer"><strong>答案：</strong> A</div>
            <div class="rationale">解析：從已掃描的檔中自動識別和提取文字、索引鍵/值組以及表格資料，是 Azure AI 文件智慧服務的核心功能。</div>
         </div>
      </div>
    `;

    function AI900PearsonVueSimulator() {
      const [appState, setAppState] = useState('setup');
      const [allQuestions, setAllQuestions] = useState([]);
      const [examQuestions, setExamQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [userAnswers, setUserAnswers] = useState({});
      const [timeLeft, setTimeLeft] = useState(0);

      // 解析 HTML 題目的邏輯 (簡化版)
      useEffect(() => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(EXAM_HTML_DATA, 'text/html');
        const cards = doc.querySelectorAll('.question-card');
        const parsed = Array.from(cards).map((card, i) => ({
          id: card.id || `q-${i}`,
          title: card.querySelector('.question-title')?.textContent,
          bodyHTML: card.querySelector('.question-body')?.innerHTML,
          answerHTML: card.querySelector('.answer-content')?.innerHTML,
          type: 'choice',
          correctAnswers: { [`${card.id}a`]: true }, // 範例正確答案
          maxPoints: 1
        }));
        setAllQuestions(parsed);
      }, []);

      const startExam = (count) => {
        setExamQuestions(allQuestions.slice(0, count));
        setTimeLeft(count * 90);
        setAppState('exam');
      };

      if (appState === 'setup') {
        return (
          <div className="flex flex-col items-center justify-center min-h-screen p-6">
            <div className="bg-white p-10 rounded-xl shadow-lg max-w-md w-full border-t-4 border-blue-600">
              <h1 className="text-2xl font-bold mb-4">AI-900 模擬考場</h1>
              <p className="text-gray-600 mb-6">準備好挑戰 Azure AI 基礎認證了嗎？</p>
              <button onClick={() => startExam(10)} className="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">
                開始測驗 (10題)
              </button>
            </div>
          </div>
        );
      }

      if (appState === 'exam') {
        const q = examQuestions[currentIndex];
        return (
          <div className="max-w-4xl mx-auto p-8">
            <div className="bg-white shadow-md rounded-lg overflow-hidden">
              <div className="bg-blue-600 p-4 text-white flex justify-between">
                <span>第 {currentIndex + 1} 題 / 共 {examQuestions.length} 題</span>
                <span>剩餘時間: {Math.floor(timeLeft/60)}分{timeLeft%60}秒</span>
              </div>
              <div className="p-8 exam-content-area">
                <h2 className="text-xl font-bold mb-4">{q.title}</h2>
                <div dangerouslySetInnerHTML={{ __html: q.bodyHTML }} />
              </div>
              <div className="bg-gray-50 p-4 flex justify-between">
                <button 
                  disabled={currentIndex === 0}
                  onClick={() => setCurrentIndex(currentIndex - 1)}
                  className="px-6 py-2 border rounded disabled:opacity-30"
                >上一步</button>
                <button 
                  onClick={() => {
                    if (currentIndex < examQuestions.length - 1) setCurrentIndex(currentIndex + 1);
                    else alert("測驗結束！此為預覽版。");
                  }}
                  className="px-6 py-2 bg-blue-600 text-white rounded"
                >{currentIndex === examQuestions.length - 1 ? '完成' : '下一步'}</button>
              </div>
            </div>
          </div>
        );
      }
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AI900PearsonVueSimulator />);
  </script>
</body>
</html>
