<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-900 Pearson VUE Simulator</title>
  <!-- 核心套件 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 圖標庫 -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    /* 這裡完整保留你提供的原始樣式 */
    .exam-content-area { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 16px; color: #1e293b; line-height: 1.6; }
    .exam-content-area p, .exam-content-area ul, .exam-content-area div { margin-bottom: 16px; }
    .exam-content-area ul { list-style-type: none; padding-left: 0; }
    .exam-content-area li { margin-bottom: 12px; padding: 12px 16px; border-radius: 4px; background-color: #f8fafc; border: 1px solid #e2e8f0; display: flex; align-items: flex-start; }
    .exam-content-area li label { cursor: pointer; width: 100%; display: block; padding-left: 10px; margin-top:-2px;}
    .exam-content-area input[type="radio"], .exam-content-area input[type="checkbox"] { width: 1.2rem; height: 1.2rem; margin-top: 2px; accent-color: #0078D4; cursor: pointer; flex-shrink: 0; }
    .matching-container { display: flex; gap: 24px; margin-top: 20px; flex-wrap: wrap; }
    .matching-column { flex: 1; min-width: 250px; background: #f1f5f9; padding: 16px; border-radius: 6px; border: 1px solid #cbd5e1; }
    .matching-answer-area { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; background: white; padding: 8px 12px; border-radius: 4px; border: 1px solid #cbd5e1; }
    .matching-answer-area input[type="text"] { width: 45px; height: 36px; text-align: center; font-weight: bold; border: 2px solid #0078D4; border-radius: 4px; text-transform: uppercase; font-size: 16px; outline: none; }
    .yes-no-item-container { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
    .result-locked input, .result-locked select { opacity: 0.8; cursor: not-allowed; }
    .keyword-highlight { background-color: transparent; padding: 0; font-weight: normal; color: inherit; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 協助將 Lucide 圖標渲染出來的組件，解決物件渲染錯誤的問題
    const Icon = ({ name, className = "w-5 h-5" }) => {
      const LucideIcon = window.lucide[name];
      return LucideIcon ? <LucideIcon className={className} /> : null;
    };

    const AI900_TERMS = ["Azure OpenAI", "表格辨識器", "電腦視覺", "自訂視覺", "臉部服務", "自然語言處理", "語音服務", "自動化機器學習", "分類", "迴歸", "叢集", "公平性", "透明度", "權責性", "異常偵測", "內容安全性"];

    const EXAM_HTML_DATA = `
      <div class="question-card" id="question-250">
          <div class="question-meta">描述 Azure 上的電腦視覺工作負載的特點 (15-20%)</div>
          <div class="question-title">第二百五十題 (選擇題)</div>
          <div class="question-body">
             <p>您應該使用下列哪種服務，從已掃描的檔中自動識取文字、索引鍵/值組以及資料表資料？</p>
             <ul>
                <li><input type="radio" name="q250" value="A" id="q250a"><label for="q250a"> A. 表格辨識器 (Form Recognizer)</label></li>
                <li><input type="radio" name="q250" value="B" id="q250b"><label for="q250b"> B. 文字分析</label></li>
             </ul>
          </div>
          <div class="answer-content">
             <div class="answer"><strong>答案：</strong> A</div>
             <div class="rationale">解析：這是 Azure AI 文件智慧服務的核心功能。</div>
          </div>
      </div>
    `;

    function AI900PearsonVueSimulator() {
      const [appState, setAppState] = useState('parsing'); 
      const [allQuestions, setAllQuestions] = useState([]);
      const [examQuestions, setExamQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [userAnswers, setUserAnswers] = useState({});
      const [timeLeft, setTimeLeft] = useState(0);
      const [showCurrentAnswer, setShowCurrentAnswer] = useState(false);
      const [customCount, setCustomCount] = useState(10); 
      
      const formRef = useRef(null);

      // 解析邏輯
      const parseHTMLContent = (htmlText) => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlText, 'text/html');
        const cards = doc.querySelectorAll('.question-card');
        return Array.from(cards).map((card, index) => {
          const qId = card.id || `gen_id_${index}`;
          const bodyNode = card.querySelector('.question-body');
          const answerNode = card.querySelector('.answer-content');
          if (!bodyNode || !answerNode) return null;
          return {
            id: qId,
            title: card.querySelector('.question-title')?.textContent || `Question ${index + 1}`,
            meta: card.querySelector('.question-meta')?.innerHTML || '',
            bodyHTML: bodyNode.innerHTML,
            answerHTML: answerNode.innerHTML,
            maxPoints: 1
          };
        }).filter(Boolean);
      };

      useEffect(() => {
        const parsed = parseHTMLContent(EXAM_HTML_DATA);
        setAllQuestions(parsed);
        setAppState('setup');
      }, []);

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setAppState('parsing');
        const reader = new FileReader();
        reader.onload = (evt) => {
          const parsed = parseHTMLContent(evt.target.result);
          setAllQuestions(parsed);
          setAppState('setup');
        };
        reader.readAsText(file);
      };

      const startExam = (count) => {
        const selected = [...allQuestions].sort(() => 0.5 - Math.random()).slice(0, count);
        setExamQuestions(selected);
        setTimeLeft(count * 90);
        setAppState('exam');
      };

      if (appState === 'parsing') return <div className="h-screen flex items-center justify-center font-bold text-blue-600">處理中...</div>;

      if (appState === 'setup') {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-100">
            <div className="bg-white rounded-2xl shadow-xl p-10 max-w-xl w-full border-t-8 border-blue-600">
              <h2 className="text-3xl font-black text-slate-800 mb-2">Pearson VUE 模擬考場</h2>
              <p className="text-slate-500 mb-8 font-medium">Exam AI-900: Azure AI Fundamentals</p>
              
              <div className="bg-blue-50 p-5 rounded-xl border border-blue-100 flex items-start mb-8">
                <Icon name="Info" className="w-6 h-6 mr-3 text-blue-600 flex-shrink-0" />
                <p className="text-blue-800 text-sm">系統目前載入了 <strong>{allQuestions.length}</strong> 道試題。您可以直接開始練習，或匯入您自己的完整 268 題 HTML 題庫。</p>
              </div>

              <div className="space-y-4">
                <button onClick={() => startExam(allQuestions.length)} className="w-full flex justify-between items-center p-5 border border-slate-200 rounded-xl hover:bg-slate-50 transition shadow-sm group">
                  <div className="text-left">
                    <div className="font-bold text-slate-800">開始測驗 ({allQuestions.length} 題)</div>
                    <div className="text-xs text-slate-400">系統將會隨機排列所有題目</div>
                  </div>
                  <Icon name="Play" className="text-blue-600" />
                </button>

                <div className="p-6 bg-slate-200 rounded-xl text-center">
                  <p className="text-slate-600 text-sm mb-4 font-bold">我有完整的 268 題題庫檔 (HTML)</p>
                  <label className="inline-flex items-center px-6 py-3 bg-white text-slate-700 border border-slate-300 rounded-lg font-bold cursor-pointer hover:bg-slate-50 shadow-sm">
                    <Icon name="UploadCloud" className="mr-2" /> 匯入題庫
                    <input type="file" className="hidden" accept=".html" onChange={handleFileUpload} />
                  </label>
                </div>
              </div>
            </div>
          </div>
        );
      }

      if (appState === 'exam') {
        const q = examQuestions[currentIndex];
        return (
          <div className="min-h-screen flex flex-col">
            <header className="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center shadow-sm">
              <div className="bg-blue-600 text-white px-3 py-1 rounded font-bold text-xs">AI-900 SIMULATOR</div>
              <div className="flex items-center font-mono font-bold text-slate-600">
                <Icon name="Clock" className="mr-2 w-4 h-4" /> {Math.floor(timeLeft/60)}:{(timeLeft%60).toString().padStart(2,'0')}
              </div>
            </header>

            <main className="flex-1 overflow-y-auto p-4 sm:p-10 flex justify-center">
              <div className="w-full max-w-4xl bg-white border border-slate-300 shadow-xl flex flex-col">
                <div className="bg-slate-100 px-8 py-4 border-b flex justify-between">
                  <span className="font-bold text-slate-700">Question {currentIndex + 1} of {examQuestions.length}</span>
                  <div className="flex items-center text-slate-400 text-sm font-bold"><Icon name="Flag" className="mr-1 w-4 h-4" /> Mark for Review</div>
                </div>

                <div className="flex-1 overflow-y-auto p-10 exam-content-area">
                  <div className="mb-4 text-slate-400 text-sm italic" dangerouslySetInnerHTML={{ __html: q.meta }} />
                  <div className="font-bold text-xl mb-6 text-slate-800">{q.title}</div>
                  <div dangerouslySetInnerHTML={{ __html: q.bodyHTML }} />
                  
                  <div className="mt-10 pt-10 border-t">
                    <button onClick={() => setShowCurrentAnswer(!showCurrentAnswer)} className="flex items-center px-4 py-2 bg-slate-100 rounded-lg border font-bold text-slate-600 hover:bg-slate-200">
                      <Icon name="Info" className="mr-2 w-4 h-4" /> {showCurrentAnswer ? '隱藏解析' : '顯示官方解析 (Practice Mode)'}
                    </button>
                    {showCurrentAnswer && (
                      <div className="mt-4 p-6 bg-emerald-50 border border-emerald-100 rounded-xl animate-in fade-in duration-300">
                        <div className="font-black text-emerald-700 mb-2 flex items-center"><Icon name="CheckCircle2" className="mr-2" /> OFFICIAL ANSWER</div>
                        <div dangerouslySetInnerHTML={{ __html: q.answerHTML }} />
                      </div>
                    )}
                  </div>
                </div>

                <div className="bg-slate-50 px-8 py-5 border-t flex justify-between">
                  <button disabled={currentIndex === 0} onClick={() => {setCurrentIndex(currentIndex-1); setShowCurrentAnswer(false);}} className="px-6 py-2 bg-white border rounded-lg font-bold text-slate-600 hover:bg-slate-100 disabled:opacity-30">Previous</button>
                  <button onClick={() => {
                    if(currentIndex < examQuestions.length - 1) { setCurrentIndex(currentIndex+1); setShowCurrentAnswer(false); }
                    else { setAppState('setup'); }
                  }} className="px-8 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 shadow-lg">
                    {currentIndex === examQuestions.length - 1 ? 'Finish' : 'Next'}
                  </button>
                </div>
              </div>
            </main>
          </div>
        );
      }
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AI900PearsonVueSimulator />);
  </script>
</body>
</html>
