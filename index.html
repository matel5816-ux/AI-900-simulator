<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-900 模擬考</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .exam-content { font-family: sans-serif; }
    .option-item { margin-bottom: 8px; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc; display: flex; align-items: center; cursor: pointer; }
    .option-item:hover { background: #f1f5f9; }
    input[type="radio"] { width: 1.2rem; height: 1.2rem; margin-right: 12px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // 主程式開始
    function AI900PearsonVueSimulator() {
      const [view, setView] = useState('home');
      
      const sampleQuestion = {
        title: "第二百五十題",
        body: "您應該使用下列哪種服務，從已掃描的檔中自動識取文字、索引鍵/值組以及資料表資料？",
        options: ["A. 表格辨識器 (Form Recognizer)", "B. 文字分析", "C. 自訂視覺", "D. LUIS"],
        correct: "A"
      };

      if (view === 'home') {
        return (
          <div className="flex items-center justify-center min-h-screen bg-gray-100 p-4">
            <div className="bg-white p-10 rounded-2xl shadow-2xl text-center max-w-sm w-full border-t-8 border-blue-600">
              <h1 className="text-3xl font-bold text-gray-800 mb-2">AI-900</h1>
              <p className="text-gray-500 mb-8">Azure AI 基礎模擬考場</p>
              <button 
                onClick={() => setView('quiz')}
                className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition transform active:scale-95"
              >
                開始練習
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="max-w-2xl mx-auto py-10 px-4 exam-content">
          <div className="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
            <div className="bg-blue-600 text-white px-6 py-4 flex justify-between items-center">
              <span className="font-bold underline decoration-2">Question 1</span>
              <button onClick={() => setView('home')} className="text-xs bg-blue-500 px-2 py-1 rounded">返回首頁</button>
            </div>
            
            <div className="p-8">
              <h2 className="text-sm font-bold text-blue-600 mb-2 uppercase tracking-widest">Multiple Choice</h2>
              <p className="text-gray-800 mb-8 text-xl font-medium leading-relaxed">{sampleQuestion.body}</p>
              
              <div className="space-y-3">
                {sampleQuestion.options.map((opt, i) => (
                  <label key={i} className="option-item">
                    <input type="radio" name="q" />
                    <span className="text-gray-700">{opt}</span>
                  </label>
                ))}
              </div>
            </div>

            <div className="p-6 bg-gray-50 border-t flex gap-4">
              <button onClick={() => alert("正確答案是 A")} className="flex-1 py-4 border-2 border-blue-600 text-blue-600 rounded-xl font-bold hover:bg-blue-50 transition">
                查看答案
              </button>
              <button onClick={() => alert("這是一個測試題目，恭喜你成功跑起來了！")} className="flex-1 py-4 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-lg transition">
                下一題
              </button>
            </div>
          </div>
        </div>
      );
    }

    // 啟動渲染
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AI900PearsonVueSimulator />);
  </script>
</body>
</html>
