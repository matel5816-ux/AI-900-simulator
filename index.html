<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-900 模擬考場</title>
  <!-- 引入基礎套件 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .exam-content-area { font-family: system-ui, sans-serif; line-height: 1.6; }
    .exam-content-area li { margin-bottom: 10px; padding: 10px; border-radius: 5px; background: #f8fafc; border: 1px solid #e2e8f0; display: flex; align-items: center; }
    .exam-content-area input { margin-right: 10px; width: 1.2rem; height: 1.2rem; }
  </style>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // 模擬題目資料
    const QUESTIONS = [
      {
        id: "q250",
        title: "第二百五十題",
        body: "您應該使用下列哪種服務，從已掃描的檔中自動識取文字、索引鍵/值組以及資料表資料？",
        options: ["表格辨識器 (Form Recognizer)", "文字分析", "自訂視覺", "Language Understanding (LUIS)"],
        answer: 0,
        rationale: "解析：這是 Azure AI 文件智慧（先前稱為表格辨識器）的核心功能。"
      }
    ];

    function App() {
      const [view, setView] = useState('home');
      const [curr, setCurr] = useState(0);
      const [showAns, setShowAns] = useState(false);

      if (view === 'home') {
        return (
          <div className="flex flex-col items-center justify-center min-h-screen">
            <div className="bg-white p-8 rounded-xl shadow-xl max-w-sm w-full text-center border-t-8 border-blue-600">
              <h1 className="text-3xl font-black text-gray-800 mb-2">AI-900</h1>
              <p className="text-gray-500 mb-8">Azure AI Fundamentals 模擬考</p>
              <button 
                onClick={() => setView('quiz')}
                className="w-full bg-blue-600 text-white py-4 rounded-lg font-bold text-lg hover:bg-blue-700 shadow-lg active:scale-95 transition"
              >
                開始練習
              </button>
            </div>
          </div>
        );
      }

      const q = QUESTIONS[curr];

      return (
        <div className="max-w-2xl mx-auto py-10 px-4">
          <div className="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
            <div className="bg-blue-600 text-white px-6 py-4 flex justify-between items-center">
              <span className="font-bold">題目 {curr + 1} / {QUESTIONS.length}</span>
              <button onClick={() => setView('home')} className="text-sm bg-blue-500 px-2 py-1 rounded">退出</button>
            </div>
            
            <div className="p-8 exam-content-area">
              <h2 className="text-xl font-bold text-gray-800 mb-4">{q.title}</h2>
              <p className="text-gray-700 mb-6 text-lg">{q.body}</p>
              <ul>
                {q.options.map((opt, i) => (
                  <li key={i}>
                    <input type="radio" name="opt" id={`o${i}`} />
                    <label htmlFor={`o${i}`} className="cursor-pointer w-full">{opt}</label>
                  </li>
                ))}
              </ul>

              {showAns && (
                <div className="mt-6 p-4 bg-green-50 border border-green-200 rounded-lg text-green-800 animate-pulse">
                  <strong>正確答案：{q.options[q.answer]}</strong><br/>
                  <small>{q.rationale}</small>
                </div>
              )}
            </div>

            <div className="p-6 bg-gray-50 border-t flex gap-4">
              <button 
                onClick={() => setShowAns(!showAns)}
                className="flex-1 py-3 border border-gray-300 rounded-lg font-bold text-gray-600 hover:bg-white"
              >
                {showAns ? '隱藏解析' : '查看答案'}
              </button>
              <button 
                onClick={() => { alert('這是一個題目的展示版本，你可以繼續添加更多題目到 QUESTIONS 數組中！'); }}
                className="flex-1 py-3 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700"
              >
                下一題
              </button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
